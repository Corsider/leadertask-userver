components_manager:
    task_processors: # Task processor is an executor for coroutine tasks
        main-task-processor: # Make a task processor for CPU-bound coroutine tasks.
            worker_threads: 4 # Process tasks in 4 threads.

        fs-task-processor: # Make a separate task processor for filesystem bound tasks.
            worker_threads: 2

    default_task_processor: main-task-processor

    components: # Configuring components that were registered via component_list
        server:
            listener: # configuring the main listening socket...
                port: 8080 # ...to listen on this port and...
                task_processor: main-task-processor # ...process incoming requests on this task processor.

        logging:
            fs-task-processor: fs-task-processor
            loggers:
                default:
                    file_path: "@stderr"
                    level: info
                    overflow_behavior: discard # Drop logs if the system is too busy to write them down.

        postgres:
            dbconnection: postgresql://userver:userver@postgres:5432/goals_db
            blocking_task_processor: fs-task-processor
            dns_resolver: async
            sync-start: true

        mongo:
            dbconnection: mongodb://mongo:27017/goals_db
            dns_resolver: async
        
        users-repository:
            {}
        
        tasks-repository:
            {}

        goals-repository:
            {}
        
        db-client:
            load-enabled: true

        # Dynamic config options. Cache is disabled, updates are disabled.
        dynamic-config:
            # For most of userver dynamic configs, defaults are used, some are overridden here.
            # See userver "dynamic config" docs for what configs exist.
            defaults:
                HTTP_CLIENT_CONNECTION_POOL_SIZE: 1000

        testsuite-support: {}

        congestion-control:

        http-client:
        http-client-core:
            load-enabled: $is_testing
            fs-task-processor: fs-task-processor

        dns-client:
            fs-task-processor: fs-task-processor

        tests-control:
            load-enabled: $is-testing
            path: /tests/{action}
            method: POST
            task_processor: main-task-processor

        handler-ping:
            path: /ping
            method: GET
            task_processor: main-task-processor
            throttling_enabled: false
            url_trailing_slash: strict-match

        handler-hello: # Finally! Our handler.
            path: /hello # Registering handler by URL '/hello'.
            method: POST # It will only reply to POST requests.
            auth:
                types:
                    - jwt-auth
            task_processor: main-task-processor # Run it on CPU bound task processor
        
        handler-signup:
            path: /api/users
            method: POST
            task_processor: main-task-processor

        handler-login:
            path: /api/users/login
            method: POST
            task_processor: main-task-processor
            secret: 3zSPwp5OPzbRoI8iR7FjLvH6j8jDuSWxy3BZejcjrIL
            secret#env: JWT_SECRET_KEY
        
        handler-users-search:
            path: /api/users/search
            method: GET
            auth:
                types:
                    - jwt-auth
            task_processor: main-task-processor
        
        handler-goals-create:
            path: /api/goals
            method: POST
            auth:
                types:
                - jwt-auth
            task_processor: main-task-processor

        handler-goals-list:
            path: /api/goals
            method: GET
            auth:
                types:
                - jwt-auth
            task_processor: main-task-processor

        handler-tasks-create:
            path: /api/goals/{goalId}/tasks
            method: POST
            auth:
                types:
                - jwt-auth
            task_processor: main-task-processor
        
        handler-goals-update-task-status:
            path: /api/goals/{goalId}/tasks/{taskId}/status
            method: PUT
            auth:
                types:
                - jwt-auth
            task_processor: main-task-processor
        
        handler-goals-list-tasks:
            path: /api/goals/{goalId}/tasks
            method: GET
            auth:
                types:
                - jwt-auth
            task_processor: main-task-processor

        jwt-auth-checker:
            load-enabled: true
            secret: 3zSPwp5OPzbRoI8iR7FjLvH6j8jDuSWxy3BZejcjrIL
            secret#env: JWT_SECRET_KEY
