version: "3.9"

services:
  postgres:
      image: postgres:15-alpine
      container_name: jwt_auth_postgres
      environment:
        POSTGRES_USER: userver
        POSTGRES_PASSWORD: userver
        POSTGRES_DB: goals_db
      ports:
        - "5432:5432"
      volumes:
        - postgres_data:/var/lib/postgresql/data
        - ./schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
        - ./data.sql:/docker-entrypoint-initdb.d/2-data.sql
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U userver -d goals_db"]
        interval: 5s
        timeout: 5s
        retries: 5
      restart: unless-stopped

  mongo:
    image: mongo:7.0
    container_name: jwt_auth_mongo
    environment:
      MONGO_INITDB_DATABASE: goals_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./data.js:/docker-entrypoint-initdb.d/init.js
    restart: unless-stopped

  userver:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jwt_auth_service
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - mongo
    environment:
      DB_CONNECTION: postgresql://userver:userver@postgres:5432/goals_db
    restart: unless-stopped
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp=unconfined
    user: "1000:1000"

volumes:
  postgres_data:
  mongo_data: